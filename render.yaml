services:
  - type: web
    name: devtrack-ai
    env: node
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: devtrack-db
          property: connectionString
      - key: NEXTAUTH_URL
        sync: false
      - key: AUTH_SECRET
        generateValue: true
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CRON_SECRET
        generateValue: true

databases:
  - name: devtrack-db
    databaseName: devtrack
    user: devtrack_user
